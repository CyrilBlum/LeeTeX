name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "Jupyter Notebooks/**"
      - "_site/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Ruby dependencies
        working-directory: docs
        run: |
          rm -f Gemfile.lock
          bundle install

      - name: Build Jekyll site
        working-directory: docs
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Install Python dependencies
        run: |
          python -m pip install -r "Jupyter Notebooks/requirements.txt"

      - name: Build JupyterLite site
        run: |
          rm -rf jupyter-dist
          jupyter lite build \
            --debug \
            --contents "./Jupyter Notebooks" \
            --output-dir jupyter-dist
            
      - name: Debug JupyterLite build output
        run: |
          echo "=== Source notebooks (first 50) ==="
          find "./Jupyter Notebooks" -type f -name "*.ipynb" | sed -n '1,50p'

          echo "=== jupyter-dist tree (maxdepth 4) ==="
          find jupyter-dist -maxdepth 4 -print | sed -n '1,200p'
      - name: Combine sites
        run: |
          mkdir -p dist
          cp -r docs/_site/* dist/
          cp -r jupyter-dist dist/jupyter

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
