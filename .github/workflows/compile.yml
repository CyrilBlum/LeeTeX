# This is a basic workflow that is manually triggered

name: Compile TeX files

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Rebuild all projects?'
        required: false
        default: 'false'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Tests if runner can be reached
  test-runner:
    name: Test if runner is reachable
    runs-on: self-hosted
    steps:
      - name: Echo test
        run: echo "Runner is alive!"

  # This workflow contains a single job called "compile", which compiles all TeX files and sends them to a server folder via rsync
  compile:
    name: Compile TeX files
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v2

    # Runs a single command using the runner's shell to make sure you have the latest version
    - name: Ensure latest version
      run: |
        git fetch --all
        git reset --hard origin/main
    # Get changed files in the commit range
    - name: Get changed files
      id: changed_files
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_rebuild }}" = "true" ]; then
          echo "Forcing full rebuild"
          echo "files=" >> $GITHUB_OUTPUT
        else
          if [ -n "${{ github.event.before }}" ]; then
            git diff --name-only ${{ github.event.before }} ${{ github.sha }} | paste -sd, - > changed_files.txt
          else
            git diff --name-only HEAD^ HEAD | paste -sd, - > changed_files.txt
          fi
          echo "files=$(cat changed_files.txt)" >> $GITHUB_OUTPUT
        fi
    # Runs the compile_tex.sh script
    - name: Run compile_tex.sh      
      run: |
        mkdir PDFs
        ./compile_tex.sh "${{ secrets.LEE_TEX_SSH_PASSWORD }}" "${{ steps.changed_files.outputs.files }}"
    - name: Upload likely culprit file
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: last_failed_file
        path: last_failed_file.txt
        if-no-files-found: ignore
  notify:
    name: Send email if anything fails
    runs-on: self-hosted
    needs: [test-runner, compile]
    if: failure()
    steps:
      - name: Download likely culprit file
        uses: actions/download-artifact@v4
        with:
          name: last_failed_file
      - name: Read likely culprit file
        id: culprit
        run: |
          if [ -f last_failed_file.txt ]; then
            culprit_line=$(head -n 1 last_failed_file.txt | tr -d '\r\n')
            echo "culprit=$culprit_line" >> $GITHUB_OUTPUT
              else
            echo "culprit=Unknown" >> $GITHUB_OUTPUT
          fi
      - name: Send email
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 🚨 GitHub CI Failed
          to: cyril@wendl.ch, thomas.graf.numerics@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            The GitHub Actions pipeline failed.
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            First line of log: ${{ steps.culprit.outputs.culprit }}
          attachments: last_failed_file.txt
  notify-success:
    name: Send email on success
    runs-on: self-hosted
    needs: [test-runner, compile]
    if: success()
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ GitHub CI Succeeded"
          to: cyril@wendl.ch, thomas.graf.numerics@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            The GitHub Actions pipeline completed successfully.
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}