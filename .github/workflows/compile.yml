# This is a basic workflow that is manually triggered

name: Compile TeX files

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Rebuild all projects?'
        required: false
        default: 'false'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Tests if runner can be reached
  test-runner:
    name: Test if runner is reachable
    runs-on: self-hosted
    steps:
      - name: Echo test
        run: echo "Runner is alive!"

  # Prepares repository state and determines changed files once for all compile jobs
  prepare-compile:
    name: Prepare compile context
    # The type of runner that the job will run on
    runs-on: self-hosted
    needs: [test-runner]
    outputs:
      changed_files: ${{ steps.changed_files.outputs.files }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Debug runner environment
    - name: Debug runner environment
      shell: bash
      run: |
        echo "Runner name: $RUNNER_NAME"
        echo "Runner OS: $RUNNER_OS"
        echo "Shell: $SHELL"
        bash --version
        sh --version || true
        uname -a

    # Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v2

    # Ensure latest version
    - name: Ensure latest version
      shell: bash
      run: |
        git fetch --all
        git reset --hard origin/main

    # Set up git hooks for git2info
    - name: Set up git2info hooks
      shell: bash
      run: |
        cp -a Git_Internal_Files/. .git/hooks
        cd .git/hooks/
        chmod ug+x post-checkout post-commit post-merge

    # Commit and push outstanding changes (if any)
    - name: Commit and push outstanding changes
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add -A
        if ! git diff --cached --quiet; then
          git commit -m "Auto-commit outstanding changes for git2info"
          git push
        fi

    # Ensure working tree is clean and up to date
    - name: Checkout latest main
      run: git checkout main
      
    # Get changed files in the commit range
    - name: Get changed files
      id: changed_files
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_rebuild }}" = "true" ]; then
          echo "Forcing full rebuild"
          echo "files=" >> $GITHUB_OUTPUT
        else
          if [ -n "${{ github.event.before }}" ]; then
            git diff --name-only ${{ github.event.before }} ${{ github.sha }} | paste -sd, - > changed_files.txt
          else
            git diff --name-only HEAD^ HEAD | paste -sd, - > changed_files.txt
          fi
          echo "files=$(cat changed_files.txt)" >> $GITHUB_OUTPUT
        fi
  compile-book:
    name: Compile TeX files (book)
    runs-on: self-hosted
    needs: [prepare-compile]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Ensure latest version
      shell: bash
      run: |
        git fetch --all
        git reset --hard origin/main

    - name: Compile book
      shell: bash
      run: |
        mkdir -p PDFs
        ./compile_tex.sh "${{ needs.prepare-compile.outputs.changed_files }}" "book"

    - name: Upload likely culprit file
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: last_failed_file
        path: last_failed_file.txt
        if-no-files-found: ignore

  compile-article:
    name: Compile TeX files (article)
    runs-on: self-hosted
    needs: [compile-book, prepare-compile]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Ensure latest version
      shell: bash
      run: |
        git fetch --all
        git reset --hard origin/main

    - name: Compile article
      shell: bash
      run: ./compile_tex.sh "${{ needs.prepare-compile.outputs.changed_files }}" "article"

    - name: Upload likely culprit file
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: last_failed_file
        path: last_failed_file.txt
        if-no-files-found: ignore

  compile-beamer:
    name: Compile TeX files (beamer)
    runs-on: self-hosted
    needs: [compile-article, prepare-compile]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Ensure latest version
      shell: bash
      run: |
        git fetch --all
        git reset --hard origin/main

    - name: Compile beamer
      shell: bash
      run: ./compile_tex.sh "${{ needs.prepare-compile.outputs.changed_files }}" "beamer"

    - name: Upload likely culprit file
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: last_failed_file
        path: last_failed_file.txt
        if-no-files-found: ignore
  notify:
    name: Send email if anything fails
    runs-on: ubuntu-latest
    needs: [test-runner, prepare-compile, compile-book, compile-article, compile-beamer]
    if: failure()
    steps:
      - name: Download likely culprit file
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: last_failed_file
      - name: Read likely culprit file
        id: culprit
        run: |
          if [ -f last_failed_file.txt ]; then
            culprit_line=$(head -n 1 last_failed_file.txt | tr -d '\r\n')
            echo "culprit=$culprit_line" >> $GITHUB_OUTPUT
          else
            echo "culprit=Unknown" >> $GITHUB_OUTPUT
          fi
      - name: Send email (Runner issue)
        if: ${{ steps.culprit.outputs.culprit == 'Unknown' }}
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🛑 GitHub CI Failed: Runner issue or Bash script failed"
          to: c@cblum.ch, thomas.graf.numerics@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            The GitHub Actions pipeline failed and no culprit file was found.
            This likely indicates a runner issue during the run or that the Bash script failed.
            Please check the server status and the latest commit changes.
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Send email (specific culprit)
        if: ${{ steps.culprit.outputs.culprit != 'Unknown' }}
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🚨 GitHub CI Failed: Check culprit file"
          to: c@cblum.ch, thomas.graf.numerics@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            The GitHub Actions pipeline failed.
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            First line of log: ${{ steps.culprit.outputs.culprit }}
          attachments: last_failed_file.txt
  notify-success:
    name: Send email on success
    runs-on: ubuntu-latest
    needs: [test-runner, prepare-compile, compile-book, compile-article, compile-beamer]
    if: success()
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ GitHub CI Succeeded"
          to: c@cblum.ch, thomas.graf.numerics@gmail.com
          from: GitHub Actions <${{ secrets.GMAIL_USERNAME }}>
          body: |
            The GitHub Actions pipeline completed successfully.
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
